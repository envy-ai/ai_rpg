need_bars:
  hydration:
    name: Hydration
    aliases:
      - thirst
      - water
    description: Represents the character's fluid levels. If this reaches 0, the character suffers severe health penalties. Dehydration happens faster than starvation.
    related_attribute: constitution
    player: true
    party: true
    non_party: false
    icon: 💧
    color: "#1E90FF"
    min: 0
    max: 1000
    initial: 1000
    change_per_minute: -20
    relative_to_level: false
    while_you_were_away_prompt_notes: This need bar should be between 75% and 100% unless there isn't anything readily available to drink. If nothing is available to drink, use your judgement depending on the circumstances.
    small_increase:
      - small sip of water
      - eating a fruit
    medium_increase:
      - drinking a glass of water
      - drinking a potion
    large_increase:
      - drinking from a waterskin
      - eating a succulent plant
    fill_completely:
      - drinking until quenched
      - visiting an oasis or well
    small_decrease:
      - hot weather
      - mild exertion
    large_decrease:
      - desert travel
      - vomiting
      - sweating profusely
    effect_thresholds:
      0:
        name: Dehydrated
        sentence: "%CHARACTER% is dehydrated and at risk of collapsing. They are extremely thirsty and will be almost completely focused on finding something to drink."
        effect: -15% to health and attributes, risk of unconsciousness
      10:
        name: Parched
        sentence: "%CHARACTER% is feeling parched. They are very thirsty and will actively seek out something to drink."
        effect: -5% to health and attributes, headaches
      250:
        name: Thirsty
        sentence: "%CHARACTER% is feeling thirsty. They'll take a drink if it's available or if they have it in their inventory."
        effect: Dry mouth, slight fatigue
      400:
        name: Slaked
        sentence: "%CHARACTER% is feeling slaked."
        effect: No effect
      1000:
        name: Hydrated
        sentence: "%CHARACTER% is feeling hydrated."
        effect: Good mood, stamina regeneration bonus
