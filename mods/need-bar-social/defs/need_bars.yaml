need_bars:
  social:
    name: Social
    description: Represents the character's need for companionship and interaction. If this reaches 0, the character becomes lonely and may suffer penalties to morale.
    related_attribute: charisma
    player: true
    party: true
    non_party: false
    icon: 🗣️
    color: "#FFD700"
    min: 0
    max: 1000
    initial: 1000
    change_per_minute: -5
    relative_to_level: false
    need_values:
      small: 100
      medium: 250
      large: 700
    small_increase:
      - brief conversation
      - receiving a compliment
      - writing a letter
    medium_increase:
      - spending time at a tavern
      - playing a team sport
      - deep conversation
    large_increase:
      - attending a festival
      - bonding with a companion
      - romantic date
    fill_completely:
      - being the center of attention
      - reconnecting with a loved one
      - successful public speaking
    small_decrease:
      - being ignored
      - minor insult
    large_decrease:
      - isolation
      - humiliation
      - exile
    effect_thresholds:
      0:
        name: Extremely lonely
        sentence: "%CHARACTER% is feeling utterly alone. Depending on how outgoing they are, they may be desperate for any social interaction or they may have given up on trying to connect with others. They are at risk of depression and will have a hard time functioning until they can get some social interaction."
        effect: -10% to morale, chance of depression
      10:
        name: Lonely
        sentence: "%CHARACTER% is feeling lonely. Depending on how outgoing they are, they may be eager for social interaction or they may be resigned to being alone. They will have a harder time focusing on tasks and may be more irritable or withdrawn."
        effect: -5% to charisma, sad mood
      250:
        name: Isolated
        sentence: "%CHARACTER% has gone a bit too long without social interaction. They may be feeling a bit lonely and will appreciate any social interaction that comes their way."
        effect: No effect
      400:
        name: Content
        sentence: "%CHARACTER% is feeling socially content."
        effect: No effect
      700:
        name: Sociable
        sentence: "%CHARACTER% is feeling sociable."
        effect: Good mood, slight bonus to charisma
      1000:
        name: Beloved
        sentence: "%CHARACTER% is feeling beloved and socially fulfilled."
        effect: High morale, bonus to leadership
