need_values:
  increase:
    small: 100
    medium: 500
    large: 1000
  decrease:
    small: 100
    medium: 250
    large: 700
need_bars:
  food:
    name: Food
    aliases:
      - hunger
      - nutrition
    description: Represents how well-fed the character is. If this reaches 0, the character may suffer penalties to health and attributes. Normal travel does not reduce this need.
    player: true
    party: false
    non_party: false
    icon: 🍖
    color: "#FFA500"
    related_attribute: constitution
    min: 0
    max: 1000
    initial: 1000
    change_per_minute: -0.7
    relative_to_level: false
    small_increase:
      - light snack
    medium_increase:
      - hearty snack, light meal, small meal
    large_increase:
      - a normal meal
      - eating an uncommon or better snack or light meal
    fill_completely:
      - feast, large meal, hearty meal
      - eating a rare or better food item of any size
      - eating until fully satisfied
    small_decrease:
      - light activity
    large_decrease:
      - strenuous activity
      - vomiting
    effect_thresholds:
      0:
        name: Starving
        sentence: "%CHARACTER% is starving and in danger of fainting. They are completely focused on finding food and will struggle to do anything else until they eat something."
        effect: -10% to health and attributes, chance of fainting
      10:
        name: Hungry
        sentence: "%CHARACTER% is feeling hungry. They are distracted by their hunger and will be more likely to seek out food if it is available."
        effect: -5% to health and attributes
      250:
        name: Peckish
        sentence: "%CHARACTER% is feeling peckish. If there are snacks available, they may have some."
        effect: No effect
      400:
        name: Not Hungry
        sentence: "%CHARACTER% is not feeling hungry."
        effect: No effect
      600:
        name: Satisfied
        sentence: "%CHARACTER% is feeling satisfied in terms of hunger."
        effect: Good mood
      800:
        name: Full
        sentence: "%CHARACTER% is feeling full in terms of hunger."
        effect: Good mood, slight bonuses
      1000:
        name: Stuffed
        sentence: "%CHARACTER% is feeling stuffed in terms of hunger."
        effect: Good mood, slight bonuses
  stamina:
    name: Stamina
    description: Represents the character's minute-to-minute energy levels. If this reaches 0, it will be difficult for them to swing weapons or do other strenuous acts. Regenerates very quickly.
    related_attribute: strength
    player: true
    party: true
    non_party: true
    color: "#33CC66"
    icon: ⚡
    min: 0
    max: 1000
    initial: 1000
    change_per_minute: 50
    relative_to_level: false
    large_increase:
      - non-strenuous activity (such as walking)
      - light exercise
      - being outside of battle
    fill_completely:
      - sitting down for a moment
      - standing still for a moment
    small_decrease:
      - moderately strenuous activity
      - swinging a weapon
    large_decrease:
      - strenuous activity
      - swinging a heavy weapon
    effect_thresholds:
      0:
        name: Breathless
        sentence: "%CHARACTER% is breathless and struggling to perform physical actions."
        effect: Slow, -4 circumstance penalty to physical actions
      10:
        name: Winded
        sentence: "%CHARACTER% is winded and finding it difficult to perform physical actions."
        effect: -2 circumstance penalty to physical actions
      150:
        name: Slightly winded
        sentence: "%CHARACTER% is slightly winded."
        effect: No effect
      250:
        name: Fine
        sentence: "%CHARACTER% is feeling fine in terms of stamina."
        effect: No effect
      700:
        name: Energized
        sentence: "%CHARACTER% is feeling energized."
        effect: Good mood, slight bonuses
      1000:
        name: Fully Energized
        sentence: "%CHARACTER% is feeling fully energized."
        effect: Good mood, slight bonuses
  rest:
    name: Rest
    aliases:
      - sleep
      - fatigue
    description: Represents how well-rested the character is. If this reaches 0, the character may suffer penalties to health and attributes. Normal travel does not reduce this need.
    related_attribute: constitution
    player: true
    party: false
    non_party: false
    color: "#00BFFF"
    icon: 🛌
    min: 0
    max: 1000
    initial: 1000
    change_per_minute: -0.6
    relative_to_level: false
    small_increase:
      - short rest
      - 2 or fewer hours of sleep
      - 1-3 hours of low activity or rest
      - took minor stimulant
      - light meditation
    large_increase:
      - 2-5 hours of sleep
      - 4+ hours of low activity or rest
      - took strong stimulant
    fill_completely:
      - 6+ hours of sleep
      - resting or sleeping until fully recovered
      - took a powerful stimulant
    small_decrease:
      - strenuous activity
    large_decrease:
      - an all-nighter
      - extreme magically or chemically induced tiredness
    effect_thresholds:
      0:
        name: Exhausted
        sentence: "%CHARACTER% is exhausted and in danger of passing out. They will struggle to stay awake and be intent on seeking rest if at all possible."
        effect: -10% to health and attributes, chance of passing out
      10:
        name: Very Tired
        sentence: "%CHARACTER% is very tired and wants to go to sleep. If reasonable, they'll seek out a place to sleep or nap."
        effect: -5% to health and attributes
      150:
        name: Tired
        sentence: "%CHARACTER% is feeling tired."
        effect: Reduced focus and minor penalties
      250:
        name: Weary
        sentence: "%CHARACTER% is feeling weary."
        effect: No effect
      400:
        name: Rested
        sentence: "%CHARACTER% is feeling rested."
        effect: No effect
      700:
        name: Well Rested
        sentence: "%CHARACTER% is feeling well rested."
        effect: Good mood, slight bonuses
      1000:
        name: Fully Rested
        sentence: "%CHARACTER% is feeling fully rested."
        effect: Good mood, slight bonuses
  mana:
    name: Mana
    aliases:
      - magic
    description: Represents the character's magical energy. Used for casting spells and magical abilities.
    related_attribute: intelligence
    player: true
    party: true
    non_party: true
    color: "#8A2BE2"
    icon: ✨
    min: 0
    max: 1000
    initial: 1000
    change_per_minute: 10
    relative_to_level: false
    small_increase:
      - minor magical recharge
      - used a small mana potion
      - light rest
      - meditated briefly
      - nap
    large_increase:
      - major magical recharge
      - used a large mana potion
      - meditated in a magical area
      - napped in a magical area
      - restless night's sleep
    fill_completely:
      - full magical recharge
      - used a powerful mana potion
      - restful night's sleep
      - resting, sleeping, or meditating until fully recovered
    small_decrease:
      - cast minor spell
      - used a minor ability that would require some kind of magical energy (like alchemy, mana, psi powers, etc)
    large_decrease:
      - cast major spell
      - used a major ability that would require some kind of magical energy (like alchemy, mana, psi powers, etc)
    effect_thresholds:
      0:
        name: Depleted
        sentence: "%CHARACTER% is completely out of mana and is unable to use any magical abilities and causing them to be lethargic and weak."
        effect: Cannot cast spells or use magical abilities, -10% to health and attributes
      10:
        name: Weak
        sentence: "%CHARACTER%'s mana is so low that it is weakening their magic and slowing them, down a bit."
        effect: Limited spellcasting, -5% to health and attributes
      250:
        name: Low
        sentence: "%CHARACTER% is low on mana. Their magic is slightly less effective than normal."
        effect: Reduced effectiveness of spells and abilities
      400:
        name: Moderate
        sentence: "%CHARACTER% has a moderate amount of mana."
        effect: No effect
      600:
        name: High
        sentence: "%CHARACTER% has a high amount of mana."
        effect: No effect
      800:
        name: Very High
        sentence: "%CHARACTER% has a very high amount of mana. Their magic is slightly stronger."
        effect: Slight bonuses to spell effectiveness
      1000:
        name: Full Power
        sentence: "%CHARACTER% is at full mana. Their magic is at its stronger than normal."
        effect: Slight bonuses to spell effectiveness and health
